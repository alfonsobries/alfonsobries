name: Setup pnpm
description: Install pnpm, Node, and a project's dependencies (frozen lockfile).

inputs:
  working-directory:
    description: Directory holding the package.json / pnpm-lock.yaml to install.
    required: true
  node-version:
    description: Node version to install.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: "10"

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
