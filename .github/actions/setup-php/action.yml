name: Setup PHP
description: Install PHP 8.4 and a Laravel app's Composer dependencies (cached).

inputs:
  working-directory:
    description: Directory holding the composer.json / composer.lock to install.
    required: true
  github-token:
    description: Token with read access to the private Composer VCS repositories (Nova).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: "8.4"
        extensions: mbstring, dom, fileinfo, bcmath, intl, gd, zip, sqlite, pdo_sqlite
        coverage: none
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/vendor
        key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Authenticate Composer for private repositories
      if: inputs.github-token != ''
      shell: bash
      run: composer config --global github-oauth.github.com "${{ inputs.github-token }}"

    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
